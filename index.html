<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyncCast | 專業無線投影</title>
    
    <!-- 引入 PeerJS 與 QRCode 庫 -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --accent: #ffffff;
            --accent-fg: #000000;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .hidden { display: none !important; opacity: 0; pointer-events: none; }
        
        h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 8px; }
        p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }

        button {
            width: 100%; padding: 14px; margin-bottom: 12px;
            font-size: 15px; font-weight: 500; border-radius: 12px;
            border: 1px solid var(--border); background: transparent; color: var(--text-main);
            cursor: pointer; transition: all 0.2s ease;
        }
        button:hover { background: rgba(255,255,255,0.05); }
        button.primary { background: var(--accent); color: var(--accent-fg); border: none; font-weight: 600; }
        button.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,255,255,0.2); }
        button.danger { background: var(--danger); color: white; border: none; }

        input {
            width: 100%; padding: 16px; margin-bottom: 20px;
            background: #000; border: 1px solid var(--border);
            border-radius: 12px; color: white; font-size: 18px;
            text-align: center; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: var(--text-muted); }

        /* 講者儀表板專用 */
        .room-code-box {
            background: #000; border-radius: 16px; padding: 20px;
            margin-bottom: 24px; border: 1px solid var(--border);
        }
        .code-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .code-display { font-size: 32px; font-weight: 700; letter-spacing: 4px; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; padding: 10px; background: white; border-radius: 12px; width: fit-content; margin-left: auto; margin-right: auto; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-right: 6px; }

        /* 觀眾播放區 (全視窗，取代舊版強制全螢幕 API 避免被擋) */
        #viewer-player {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #remote-video { width: 100%; height: 100%; object-fit: contain; }
        
        .loading-text { font-size: 14px; color: var(--text-muted); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- 1. 歡迎介面 -->
    <div id="view-home" class="container">
        <h1>SyncCast</h1>
        <p class="subtitle">專業無線投影系統</p>
        <button class="primary" onclick="initRole('presenter')">發起投影 (講者)</button>
        <button onclick="initRole('viewer')">加入投影 (觀眾)</button>
    </div>

    <!-- 2. 講者介面 -->
    <div id="view-presenter" class="container hidden">
        <h1>控制台</h1>
        <p class="subtitle"><span class="status-dot"></span>已連線觀眾: <span id="viewer-count">0</span></p>
        
        <div class="room-code-box">
            <div class="code-title">連線代碼</div>
            <div id="room-id" class="code-display">...</div>
            <div id="qrcode"></div>
        </div>

        <button id="btn-share" class="primary" onclick="startScreenShare()">分享畫面</button>
    </div>

    <!-- 3. 觀眾輸入介面 -->
    <div id="view-viewer" class="container hidden">
        <h1>加入投影</h1>
        <p class="subtitle" id="viewer-subtitle">請輸入講者畫面上的代碼</p>
        <input type="text" id="join-id" placeholder="例如: 8A9X" autocomplete="off">
        <button class="primary" onclick="joinSession()">連線</button>
        <button onclick="location.href=location.pathname">返回</button>
    </div>

    <!-- 4. 觀眾播放介面 (全螢幕) -->
    <div id="viewer-player" class="hidden">
        <div id="player-loading" class="loading-text">連線中，等待講者分享畫面...</div>
        <!-- 加上 autoplay playsinline 確保手機端能網頁內聯播 -->
        <video id="remote-video" autoplay playsinline muted></video>
    </div>

    <script>
        // Google 免費穩定的 STUN 伺服器，提升連線成功率
        const peerConfig = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } };
        let peer = null;
        let localStream = null;
        let activeConnections = []; // 儲存已連線的觀眾 ID

        // 啟動時檢查是否來自 QR Code 的 URL
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            if (roomParam) {
                document.getElementById('join-id').value = roomParam;
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('view-viewer').classList.remove('hidden');
                document.getElementById('viewer-subtitle').innerText = "已掃描代碼，請點擊連線";
            }
        };

        // UI 視圖切換
        function switchView(viewId) {
            document.querySelectorAll('.container, #viewer-player').forEach(el => el.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        }

        function initRole(role) {
            if (role === 'presenter') {
                switchView('view-presenter');
                setupPresenter();
            } else {
                switchView('view-viewer');
            }
        }

        /* ================= 講者端邏輯 ================= */
        function setupPresenter() {
            peer = new Peer(generateShortID(), peerConfig); 
            
            peer.on('open', (id) => {
                document.getElementById('room-id').innerText = id;
                // 產生供觀眾掃描的網址與 QR Code
                const joinUrl = `${window.location.origin}${window.location.pathname}?room=${id}`;
                new QRCode(document.getElementById("qrcode"), {
                    text: joinUrl, width: 140, height: 140,
                    colorDark: "#000000", colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.L
                });
            });

            // 監聽觀眾連線
            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    if (!activeConnections.includes(conn.peer)) activeConnections.push(conn.peer);
                    updateViewerCount();

                    // 【核心修復】如果講者已經在分享畫面，有新觀眾進來時，主動發起視訊流
                    if (localStream) {
                        peer.call(conn.peer, localStream);
                    }
                });

                conn.on('close', () => {
                    activeConnections = activeConnections.filter(id => id !== conn.peer);
                    updateViewerCount();
                });
            });
        }

        function updateViewerCount() {
            document.getElementById('viewer-count').innerText = activeConnections.length;
        }

        async function startScreenShare() {
            try {
                // 請求分享視窗
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always" }, audio: false });
                
                const btnShare = document.getElementById('btn-share');
                btnShare.innerText = "停止分享";
                btnShare.classList.remove('primary');
                btnShare.classList.add('danger');
                btnShare.onclick = () => location.reload();

                // 當講者關閉瀏覽器自帶的「停止分享」按鈕
                localStream.getVideoTracks()[0].onended = () => location.reload();

                // 【核心修復】講者開始分享時，遍歷所有已連線的觀眾，主動把畫面塞給他們
                activeConnections.forEach(viewerId => {
                    peer.call(viewerId, localStream);
                });

            } catch (err) {
                console.error(err);
                alert("無法擷取畫面，請確認已授予權限。");
            }
        }

        // 產生 4 碼易讀的連線代碼 (濾除 O, 0, I, 1 等易混淆字)
        function generateShortID() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let id = '';
            for (let i = 0; i < 4; i++) id += chars.charAt(Math.floor(Math.random() * chars.length));
            return id;
        }

        /* ================= 觀眾端邏輯 ================= */
        function joinSession() {
            const hostId = document.getElementById('join-id').value.trim().toUpperCase();
            if (!hostId) return;

            switchView('viewer-player');
            peer = new Peer(peerConfig);

            peer.on('open', () => {
                // 建立基礎資料連線 (讓講者知道我們進來了)
                const conn = peer.connect(hostId);
                conn.on('close', () => { alert('講者已結束投影'); location.reload(); });
            });

            // 準備接聽講者主動傳來的視訊流
            peer.on('call', (call) => {
                call.answer(); // 自動接聽
                call.on('stream', (remoteStream) => {
                    // 收到畫面，隱藏等待文字，播放影片
                    document.getElementById('player-loading').style.display = 'none';
                    const videoEl = document.getElementById('remote-video');
                    videoEl.srcObject = remoteStream;
                    
                    // 針對部分手機瀏覽器需手動觸發播放
                    videoEl.play().catch(e => console.log("等待使用者互動以播放"));
                });
            });

            peer.on('error', (err) => {
                alert("連線失敗，請確認代碼是否正確或講者是否已開啟。");
                location.href = location.pathname;
            });
        }
    </script>
</body>
</html>
