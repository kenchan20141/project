<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyncCast - Pure HTML Native WebRTC</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght=0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- 引入 MQTT.js 作為免費的信令交換中心 (取代 Firebase/PeerJS) -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --morandi-bg: #EAE5DF; --morandi-surface: #F5F3EF; --morandi-primary: #7A8485;
            --morandi-primary-hover: #606A6B; --morandi-text: #2C302E; --morandi-muted: #8E8A85;
            --morandi-border: #D1CEC5; --font-serif: 'Playfair Display', serif; --font-sans: 'Inter', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--morandi-bg); color: var(--morandi-text); font-family: var(--font-sans);
            display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px 16px; 
            -webkit-font-smoothing: antialiased;
        }
        .container {
            background: var(--morandi-surface); border: 1px solid var(--morandi-border); padding: 32px 24px; width: 100%; max-width: 400px;
            text-align: center; box-shadow: 10px 10px 40px rgba(0,0,0,0.04); transition: opacity 0.4s ease;
        }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
        h1 { font-family: var(--font-serif); font-size: 32px; font-weight: 400; margin-bottom: 12px; font-style: italic; }
        p.subtitle { color: var(--morandi-muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
        button {
            width: 100%; padding: 16px; margin-bottom: 16px; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; 
            border: 1px solid var(--morandi-border); background: transparent; cursor: pointer; transition: all 0.3s ease;
        }
        button.primary { background: var(--morandi-primary); color: #FFF; border: none; }
        button.primary:hover { background: var(--morandi-primary-hover); transform: translateY(-1px); }
        input {
            width: 100%; padding: 16px 0; margin-bottom: 32px; background: transparent; border: none; border-bottom: 1px solid var(--morandi-border); 
            font-size: 24px; font-family: var(--font-serif); text-align: center; outline: none; text-transform: uppercase;
        }
        .code-display { font-family: var(--font-serif); font-size: 42px; letter-spacing: 8px; margin-bottom: 24px; }
        .preview-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid var(--morandi-border); margin-bottom: 24px; overflow: hidden; display: flex; align-items: center; justify-content: center;}
        video { width: 100%; height: 100%; object-fit: contain; }
        #qrcode { display: flex; justify-content: center; margin: 24px auto 0; max-width: 140px; }
        
        #viewer-player { position: fixed; inset: 0; background: #1A1A1A; z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .loading-text { color: #FFF; font-family: var(--font-serif); font-size: 16px; letter-spacing: 1px; margin-bottom: 20px;}
        .log-box { position: absolute; bottom: 10px; left: 10px; color: #55ff55; font-family: monospace; font-size: 10px; text-align: left; opacity: 0.7;}
    </style>
</head>
<body>

    <!-- 首頁 -->
    <div id="view-home" class="container">
        <h1>SyncCast</h1>
        <p class="subtitle">Pure Native WebRTC</p>
        <button class="primary" onclick="initPresenter()">Start Presenting</button>
        <button onclick="initViewer()">Join Session</button>
    </div>

    <!-- 講者端 -->
    <div id="view-presenter" class="container hidden">
        <h1>Studio</h1>
        <p class="subtitle">Broadcast Dashboard</p>
        <div id="room-id" class="code-display">...</div>
        <div class="preview-wrapper">
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <div style="font-size: 12px; color: var(--morandi-primary); margin-bottom: 16px;" id="host-status">等待觀眾連線...</div>
        <button class="primary" onclick="location.reload()">End Session</button>
        <div id="qrcode"></div>
    </div>

    <!-- 觀眾輸入房號 -->
    <div id="view-viewer" class="container hidden">
        <h1>Join</h1>
        <p class="subtitle">Enter Access Code</p>
        <input type="text" id="join-id" placeholder="e.g. 8A9X" autocomplete="off" maxlength="4">
        <button class="primary" onclick="joinRoom()">Connect</button>
        <button onclick="location.reload()">Back</button>
    </div>

    <!-- 觀眾播放器 -->
    <div id="viewer-player" class="hidden">
        <div id="loading-msg" class="loading-text">Connecting to Network...</div>
        <video id="remote-video" autoplay playsinline></video>
        <div class="log-box" id="viewer-logs"></div>
    </div>

    <script>
        // ==========================================
        // 核心設定
        // ==========================================
        const myId = Math.random().toString(36).substring(2, 10); // 產生裝置唯一 ID
        let roomCode = "";
        let mqttClient = null;
        let localStream = null;
        let peerConnections = {}; // 講者用來管理多個觀眾的連線

        // 免費的最強 STUN 陣列 (幫助穿透一般分享器/防火牆)
        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun.cloudflare.com:3478' }
            ]
        };

        function switchView(viewId) {
            document.querySelectorAll('.container, #viewer-player').forEach(el => el.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        }

        function logToViewer(msg) {
            const logBox = document.getElementById('viewer-logs');
            if(logBox) logBox.innerHTML += `> ${msg}<br>`;
            console.log(msg);
        }

        // ==========================================
        // 網路信令系統 (使用公共免費的 EMQX MQTT Broker)
        // ==========================================
        function connectSignaling(code, onMessage) {
            // 連接到免費的公共 WebSocket MQTT 伺服器
            mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
            const topic = `synccast_webrtc_secret_room_${code}`;

            mqttClient.on('connect', () => {
                console.log("MQTT 連線成功！Topic:", topic);
                mqttClient.subscribe(topic);
            });

            mqttClient.on('message', (t, message) => {
                try {
                    const data = JSON.parse(message.toString());
                    if (data.sender === myId) return; // 忽略自己發送的訊息
                    onMessage(data, topic);
                } catch (e) { console.error("解析訊息失敗", e); }
            });
            
            return topic;
        }

        function sendSignal(topic, data) {
            data.sender = myId;
            mqttClient.publish(topic, JSON.stringify(data));
        }

        // ==========================================
        // 講者端邏輯 (Host)
        // ==========================================
        async function initPresenter() {
            try {
                // 1. 先取得螢幕分享權限
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
                document.getElementById('local-video').srcObject = localStream;
                
                // 2. 產生房號切換畫面
                roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
                document.getElementById('room-id').innerText = roomCode;
                switchView('view-presenter');
                new QRCode(document.getElementById("qrcode"), { 
                    text: `${window.location.origin}${window.location.pathname}?room=${roomCode}`, 
                    width: 128, height: 128 
                });

                // 當停止分享時重新整理
                localStream.getVideoTracks()[0].onended = () => location.reload();

                // 3. 連接信令伺服器，等待觀眾加入
                const topic = connectSignaling(roomCode, async (data) => {
                    
                    // 觀眾請求加入
                    if (data.type === 'join') {
                        document.getElementById('host-status').innerText = `觀眾 (${data.sender}) 正在連線...`;
                        
                        // 建立專屬這位觀眾的 P2P 連線
                        const pc = new RTCPeerConnection(rtcConfig);
                        peerConnections[data.sender] = pc;

                        // 把螢幕畫面加入連線
                        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

                        // 處理 ICE 候選路徑
                        pc.onicecandidate = (e) => {
                            if (e.candidate) sendSignal(topic, { type: 'ice', target: data.sender, candidate: e.candidate });
                        };

                        // 產生 WebRTC Offer 並發送給該觀眾
                        const offer = await pc.createOffer();
                        await pc.setLocalDescription(offer);
                        sendSignal(topic, { type: 'offer', target: data.sender, sdp: offer });
                    }
                    
                    // 接收觀眾的 Answer
                    else if (data.type === 'answer' && data.target === myId) {
                        const pc = peerConnections[data.sender];
                        if(pc) await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                        document.getElementById('host-status').innerText = `連線成功！`;
                    }
                    
                    // 接收觀眾的 ICE 路徑
                    else if (data.type === 'ice' && data.target === myId) {
                        const pc = peerConnections[data.sender];
                        if(pc && data.candidate) pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    }
                });

            } catch (err) {
                alert("分享螢幕失敗或被拒絕");
                location.reload();
            }
        }


        // ==========================================
        // 觀眾端邏輯 (Viewer)
        // ==========================================
        function initViewer() {
            switchView('view-viewer');
            const params = new URLSearchParams(window.location.search);
            if (params.get('room')) document.getElementById('join-id').value = params.get('room');
        }

        function joinRoom() {
            roomCode = document.getElementById('join-id').value.trim().toUpperCase();
            if (!roomCode) return;
            
            switchView('viewer-player');
            let pc = new RTCPeerConnection(rtcConfig);
            
            // 當收到影片流時，綁定到 Video 標籤
            pc.ontrack = (event) => {
                logToViewer("收到影片串流！");
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('remote-video').srcObject = event.streams[0];
            };

            const topic = connectSignaling(roomCode, async (data) => {
                // 確保訊息是發給我的
                if (data.target !== myId && data.type !== 'join') return;

                // 收到講者的 Offer
                if (data.type === 'offer') {
                    logToViewer("收到 Host 邀請，建立連線...");
                    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                    
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    
                    // 回傳 Answer 給講者
                    sendSignal(topic, { type: 'answer', target: data.sender, sdp: answer });
                }
                // 收到講者的 ICE 路徑
                else if (data.type === 'ice') {
                    if (data.candidate) pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });

            // 處理自己的 ICE 候選路徑，發送給講者
            pc.onicecandidate = (e) => {
                // 因為我們不知道 hostId，我們把 target 設為 'host' (在我們這個簡單架構中發給所有人，由 host 自己過濾)
                if (e.candidate) sendSignal(topic, { type: 'ice', target: 'host', candidate: e.candidate });
            };

            // 連接上 MQTT 後，等待 1 秒發送 Join 廣播，告訴講者我來了
            setTimeout(() => {
                logToViewer("發送加入請求...");
                sendSignal(topic, { type: 'join' });
            }, 1000);
        }
    </script>
</body>
</html>
