<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyncCast - Premium Cinema Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --studio-black: #0A0A0B;
            --deep-slate: #161618;
            --accent-gold: #E6B325;
            --film-red: #E53935;
            --glass: rgba(255, 255, 255, 0.05);
            --font-main: 'Montserrat', sans-serif;
            --font-code: 'Space Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--studio-black);
            color: #FFFFFF;
            font-family: var(--font-main);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1c1c1f 0%, #0a0a0b 100%);
        }

        /* 精細膠片元素：頂部與底部裝飾條 */
        .film-header, .film-footer {
            position: fixed; left: 0; width: 100%; height: 40px;
            background-image: radial-gradient(circle, #222 30%, transparent 35%);
            background-size: 40px 40px;
            opacity: 0.3; z-index: 0;
        }
        .film-header { top: 0; }
        .film-footer { bottom: 0; }

        .container {
            position: relative;
            background: var(--deep-slate);
            width: 90%; max-width: 450px;
            padding: 40px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-weight: 800; font-size: 38px; letter-spacing: 4px;
            color: #FFF; margin-bottom: 8px; text-transform: uppercase;
        }

        .subtitle {
            font-size: 11px; color: var(--accent-gold); letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 40px; opacity: 0.8;
        }

        /* 房號顯示區 - 放大加強版 */
        .token-display-box {
            background: #000;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px inset rgba(255,255,255,0.05);
        }
        .label-small { font-size: 10px; color: #555; margin-bottom: 10px; letter-spacing: 1px; }
        .token-text {
            font-family: var(--font-code);
            font-size: 52px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(230, 179, 37, 0.3);
        }

        /* 影片預覽框 - 專業監視器感 */
        .monitor-wrapper {
            position: relative;
            width: 100%; aspect-ratio: 16/9;
            background: #000; border: 2px solid #222;
            margin-bottom: 24px; border-radius: 4px; overflow: hidden;
        }
        .monitor-tag {
            position: absolute; top: 8px; left: 8px;
            font-size: 9px; background: var(--film-red);
            padding: 2px 6px; border-radius: 2px; font-weight: bold; z-index: 5;
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* 按鈕設計 */
        button {
            width: 100%; padding: 18px; margin-bottom: 12px;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: #FFF; font-family: var(--font-main); font-weight: 600;
            font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        button:hover { background: #FFF; color: #000; transform: translateY(-2px); }
        button.primary { background: var(--accent-gold); color: #000; border: none; }
        button.primary:hover { background: #FFC82C; box-shadow: 0 10px 20px rgba(230, 179, 37, 0.2); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        input {
            width: 100%; padding: 20px; background: rgba(0,0,0,0.3);
            border: none; border-bottom: 2px solid #333;
            color: #FFF; font-family: var(--font-code); font-size: 32px;
            text-align: center; outline: none; margin-bottom: 30px; transition: 0.3s;
        }
        input:focus { border-bottom-color: var(--accent-gold); }

        /* 狀態指示燈 */
        .status-bar { font-size: 11px; color: #666; margin-bottom: 20px; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .dot-rec { background: var(--film-red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #qrcode { 
            margin: 20px auto 0; padding: 10px; background: #FFF; 
            width: fit-content; border-radius: 4px; 
        }

        .hidden { display: none !important; }

        /* 觀眾播放器 - 全螢幕極簡 */
        #viewer-player {
            position: fixed; inset: 0; background: #000;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        .player-controls {
            position: absolute; top: 20px; width: 90%;
            display: flex; justify-content: space-between; z-index: 1001;
        }
        .mini-btn { width: auto; padding: 8px 16px; font-size: 10px; background: rgba(0,0,0,0.6); }

        #manual-play-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; z-index: 1002;
        }
    </style>
</head>
<body>

    <div class="film-header"></div>
    <div class="film-footer"></div>

    <div id="view-home" class="container">
        <h1>SyncCast</h1>
        <p class="subtitle">Screen Sharing Studio</p>
        <button class="primary" onclick="initRole('presenter')">Start Presenting</button>
        <button onclick="initRole('viewer')">Join Session</button>
    </div>

    <div id="view-presenter" class="container hidden">
        <h1>Studio</h1>
        <p class="subtitle">Broadcast Control</p>
        
        <div class="token-display-box">
            <div class="label-small">ACCESS CODE</div>
            <div id="room-id" class="token-text">----</div>
        </div>

        <div class="monitor-wrapper">
            <div class="monitor-tag">LIVE PREVIEW</div>
            <video id="local-video" autoplay playsinline muted></video>
        </div>

        <div class="status-bar">
            <span class="dot dot-rec"></span>CONNECTED VIEWERS: <span id="viewer-count" style="color:#FFF">0</span>
        </div>

        <button id="btn-share" class="primary" onclick="startScreenShare()">Start Screen Share</button>
        <div id="qrcode"></div>
    </div>

    <div id="view-viewer" class="container hidden">
        <h1>Connect</h1>
        <p class="subtitle">Enter Studio Token</p>
        <input type="text" id="join-id" placeholder="0000" maxlength="4" autocomplete="off">
        <button class="primary" onclick="joinSession()">Establish Connection</button>
        <button style="border:none; color:#555" onclick="location.reload()">Return</button>
    </div>

    <div id="viewer-player" class="hidden">
        <div class="player-controls">
            <button class="mini-btn" onclick="confirmExit()">✖ EXIT</button>
            <button class="mini-btn" onclick="toggleFullScreen()">⛶ FULLSCREEN</button>
        </div>
        
        <div id="player-loading" style="text-align:center">
            <div class="dot dot-rec"></div>
            <p style="font-size: 10px; letter-spacing: 2px; margin-top:10px">SYNCING SIGNAL...</p>
        </div>

        <video id="remote-video" autoplay playsinline></video>

        <div id="manual-play-overlay" class="hidden">
            <button class="primary" style="width:auto; padding:20px 40px" onclick="forcePlay()">▶ START STREAM</button>
        </div>
    </div>

    <script>
        const ID_PREFIX = "sync-cinema-";
        let peer = null;
        let localStream = null;
        let connectedViewers = new Map();
        let activeCalls = new Map();

        function switchView(viewId) {
            document.querySelectorAll('.container, #viewer-player').forEach(el => el.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        }

        async function getIceServers() {
            return [
                { urls: 'stun:stun.l.google.com:19302' },
                {
                    urls: 'turn:free.expressturn.com:3478',
                    username: "000000002095629902",
                    credential: "G/cOmHLAPAAts04J1oj3AdBl6nE="
                }
            ];
        }

        // 初始化
        async function initRole(role) {
            const ice = await getIceServers();
            if (role === 'presenter') {
                switchView('view-presenter');
                setupPresenter(ice);
            } else {
                switchView('view-viewer');
            }
        }

        // 講者邏輯
        function setupPresenter(ice) {
            const displayId = Math.random().toString(36).substring(2,6).toUpperCase();
            peer = new Peer(ID_PREFIX + displayId, { config: { iceServers: ice } });

            peer.on('open', (id) => {
                document.getElementById('room-id').innerText = displayId;
                const url = `${window.location.origin}${window.location.pathname}?room=${displayId}`;
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: url, width: 120, height: 120 });
            });

            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    connectedViewers.set(conn.peer, conn);
                    updateViewerCount();
                    if(localStream) callViewer(conn.peer);
                });
                conn.on('close', () => {
                    connectedViewers.delete(conn.peer);
                    updateViewerCount();
                });
            });
        }

        function updateViewerCount() {
            document.getElementById('viewer-count').innerText = connectedViewers.size;
        }

        async function startScreenShare() {
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
                    audio: true
                });
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('btn-share').innerText = "LIVE NOW";
                document.getElementById('btn-share').style.background = "#333";

                connectedViewers.forEach((conn, peerId) => callViewer(peerId));

                localStream.getVideoTracks()[0].onended = () => {
                    location.reload();
                };
            } catch (e) { console.error("Share failed:", e); }
        }

        function callViewer(peerId) {
            if (!localStream) return;
            const call = peer.call(peerId, localStream);
            activeCalls.set(peerId, call);
        }

        // 觀眾邏輯
        function joinSession() {
            const val = document.getElementById('join-id').value.toUpperCase();
            if(val) startViewer(val);
        }

        async function startViewer(hostId) {
            const ice = await getIceServers();
            switchView('viewer-player');
            peer = new Peer(undefined, { config: { iceServers: ice } });

            peer.on('open', () => {
                const conn = peer.connect(ID_PREFIX + hostId);
                conn.on('open', () => console.log("Connected to Host"));
            });

            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (stream) => {
                    document.getElementById('player-loading').classList.add('hidden');
                    const v = document.getElementById('remote-video');
                    v.srcObject = stream;
                    v.play().catch(() => {
                        document.getElementById('manual-play-overlay').classList.remove('hidden');
                    });
                });
            });

            peer.on('error', () => {
                alert("Studio not found.");
                location.reload();
            });
        }

        function forcePlay() {
            document.getElementById('remote-video').play();
            document.getElementById('manual-play-overlay').classList.add('hidden');
        }

        function toggleFullScreen() {
            const el = document.getElementById('viewer-player');
            if (!document.fullscreenElement) el.requestFullscreen();
            else document.exitFullscreen();
        }

        function confirmExit() {
            if(confirm("確定結束觀看？")) location.reload();
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const room = urlParams.get('room');
            if(room) {
                document.getElementById('join-id').value = room;
                initRole('viewer');
                setTimeout(joinSession, 500);
            }
        };
    </script>
</body>
</html>
